<div class="search-container">
  <form class="search-form" [formGroup]="form">
    <app-input class="input" formControlName="firstName" label="Имя" placeholder="" />
    <app-input class="input" formControlName="lastName" label="Фамилия" placeholder="" />
    <app-stack-input formControlName="stack" [stack]="[]" />
  </form>
</div>
<div>
  @if (profiles()) {
    @for (profile of profiles(); track profile.id) {
      <app-profile-card [profile]="profile" />
    }
  }
</div>
