@if (chat(); as chat) {
  <app-chat-header class="chat-header" [companion]="chat.companion" />
  <div class="messages-wrapper">
    <div class="messages">
      <app-chat-messages [chat]="chat" />
    </div>
    <app-post-form class="post-form" placeholder="Напишите что-нибудь" (sendPost)="sendMessage($event)" />
  </div>
}
