<div class="textarea-wrapper">
  <p class="textarea-label">{{ label() }}</p>
  <textarea
    [class]="{ textarea: true, bordered: isBordered() }"
    [cols]="cols()"
    [placeholder]="placeholder()"
    [rows]="rows()"
    [value]="inputValue()"
    (blur)="onTouch()"
    (input)="onInput($event)"
  >
  </textarea>
</div>
